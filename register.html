<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Register - Typing Institute</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
body {
  font-family: 'Poppins', sans-serif;
  background: linear-gradient(135deg, #141e30, #243b55);
  color: white;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

.container {
  background: rgba(255,255,255,0.1);
  padding: 30px;
  border-radius: 12px;
  width: 90%;
  max-width: 400px;
  backdrop-filter: blur(10px);
  text-align: center;
}

h2 {
  margin-bottom: 20px;
}

input, select {
  width: 100%;
  padding: 12px;
  margin-bottom: 15px;
  border: none;
  border-radius: 8px;
}

button {
  width: 100%;
  padding: 12px;
  background: #00f2fe;
  border: none;
  border-radius: 8px;
  font-weight: bold;
  cursor: pointer;
}

button:hover {
  background: #4facfe;
}
</style>
</head>

<body>

<div class="container">
  <h2>Register Now</h2>

  <form onsubmit="sendToWhatsApp(event)">
    <input type="text" id="name" placeholder="Your Name" required>
    <input type="tel" id="phone" placeholder="Phone Number" required>

    <select id="course" required>
      <option value="">Select Course</option>
      <option>Junior Tamil</option>
      <option>Junior English</option>
      <option>Senior Tamil</option>
      <option>Senior English</option>
    </select>

    <button type="submit">Submit</button>
  </form>
</div>

<script>
function sendToWhatsApp(e) {
  e.preventDefault();

  let name = document.getElementById("name").value;
  let phone = document.getElementById("phone").value;
  let course = document.getElementById("course").value;

  let message = `New Student Registration:%0AName: ${name}%0APhone: ${phone}%0ACourse: ${course}`;

  window.open(`https://wa.me/919876543210?text=${message}`, "_blank");
}
</script>

</body>
</html>
